name: ✨ Feature request
description: Suggest a new feature or improvement for ARN-Lifebar.
title: "[feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! ARN-Lifebar stays intentionally small — just a few sanity checks at the bottom of the form to keep it that way. If your idea fits the shape, I'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear description of what you would like to see happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.
    validations:
      required: false

  - type: checkboxes
    id: shape
    attributes:
      label: Quick sanity checks
      description: These shape what ARN-Lifebar is. Confirming helps me say yes faster.
      options:
        - label: My proposal does not add a runtime dependency to the extension manifest.
          required: true
        - label: My proposal does not require a Webview or a heavy UI surface (status bar only).
          required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshots, mock-ups, links to similar features in other extensions, etc.
    validations:
      required: false
