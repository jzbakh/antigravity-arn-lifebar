name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to VS Marketplace + Open VSX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Pre-flight — tag must match package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          echo "package.json version: $PKG_VERSION"
          echo "release tag version : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Syntax check
        run: node -c extension.js

      - name: Build .vsix
        run: npx --yes @vscode/vsce package -o antigravity-arn-lifebar.vsix

      - name: Show bundle contents
        run: npx --yes @vscode/vsce ls

      - name: Publish to VS Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT_Lifebar }}
        run: npx --yes @vscode/vsce publish --packagePath antigravity-arn-lifebar.vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT_Lifebar }}
        run: npx --yes ovsx publish antigravity-arn-lifebar.vsix -p "$OVSX_PAT"

      - name: Upload .vsix as workflow artefact
        uses: actions/upload-artifact@v7
        with:
          name: antigravity-arn-lifebar-vsix
          path: antigravity-arn-lifebar.vsix
          retention-days: 30
